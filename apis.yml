description: This repository accumulates and contextualizes evidence of police brutality during the 2020 George Floyd protests.
  The goal is to assist journalists, politicians, prosecutors, activists and concerned individuals who can use the evidence
  accumulated here for political campaigns, news reporting, public education and prosecution of criminal police officers.
