naftiko: "1.0.0-alpha1"

info:
  label: 2020 Police Brutality API
  description: >-
    Static data API providing documented incidents of police brutality during the
    2020 George Floyd protests. Data is available as raw JSON and CSV files from
    GitHub raw content URLs. No authentication required.
  tags:
    - Public Data
    - Policing
    - Civil Rights
  created: "2026-04-19"
  modified: "2026-04-19"

capability:
  consumes:
    - type: http
      namespace: 2020-police-brutality
      baseUri: https://raw.githubusercontent.com/2020PB/police-brutality/data_build
      description: Static JSON data files for 2020 police brutality incident documentation
      resources:
        - name: incidents
          path: /all-locations.json
          description: All documented police brutality incidents
          operations:
            - name: get-all-incidents
              method: GET
              description: Retrieve all documented police brutality incidents as JSON
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: get-all-incidents-v2
              method: GET
              description: Retrieve all incidents in v2 format with improved schema
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: get-all-incidents-csv
              method: GET
              description: Retrieve all incidents in CSV format for spreadsheet analysis
              inputParameters: []
              outputRawFormat: csv
              outputParameters:
                - name: result
                  type: string
                  value: $.

  exposes:
    - type: rest
      port: 8100
      namespace: 2020-police-brutality-rest
      resources:
        - path: /v1/incidents
          name: incidents
          description: All documented police brutality incidents
          operations:
            - method: GET
              name: get-all-incidents
              description: Retrieve all documented police brutality incidents
              call: "2020-police-brutality.get-all-incidents"
              outputParameters:
                - type: object
                  mapping: $.

    - type: mcp
      port: 9100
      namespace: 2020-police-brutality-mcp
      transport: http
      tools:
        - name: get-all-incidents
          description: Retrieve all documented police brutality incidents from the 2020 George Floyd protests
          hints:
            readOnly: true
            openWorld: true
          call: "2020-police-brutality.get-all-incidents"
          outputParameters:
            - type: object
              mapping: $.
        - name: get-all-incidents-csv
          description: Retrieve all police brutality incidents in CSV format for analysis
          hints:
            readOnly: true
            openWorld: true
          call: "2020-police-brutality.get-all-incidents-csv"
          outputParameters:
            - type: string
              mapping: $.
